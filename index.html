<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">


        <div id="startScreen" class="card shadow-sm p-5 text-center">
            <h1 class="card-title mb-3">WELCOME TO THE QUIZ</h1>
            <p class="card-text">Test your general knowledge here. Take your time to answer, there is no time limit.</p>
            <button id="startBtn" class="btn btn-primary">Start Quiz</button>
        </div>


        <div id="quizScreen" class="card shadow-sm p-5 d-none">
            <div class="d-flex justify-content-between mb-2">
                <span id="progressText">Question 1 out of 5</span>
                <span id="scoreText">Score : 0</span>
            </div>

            <h3 id="questionText" class="mb-4">Question comes here.</h3>
            <div id="optionsContainer"></div>
            <button id="nextBtn" class="btn btn-secondary mt-4 d-none">Next Question</button>

        </div>

        <div id="resultScreen" class="card shadow-sm p-4 text-center d-none">
            <h1>QUIZ COMPLETED!!!!</h1>
            <p class="mt-3">You scored</p>
            <h1 id="finalScore" class="display-4 text-success">0 / 0</h1>
            <button id="restartBtn" class="btn btn-outline-info mt-4">Try Again</button>
        </div>


    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
